<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime İzle - Benim Gizli Sitem</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0d0d13; color: #fff; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 2px solid #1a1a26; margin-bottom: 25px; }
        header h1 { color: #ff3e6c; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .main-container { max-width: 1200px; margin: 0 auto; }
        
        /* Video Oynatıcı Alanı */
        .player-wrapper { background: #14141f; border-radius: 12px; padding: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); margin-bottom: 30px; border: 1px solid #232335; }
        .player-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; background: #000; }
        .player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .video-title { margin-top: 15px; font-size: 20px; color: #ff3e6c; font-weight: 600; }

        /* Anime Listesi */
        .section-title { font-size: 22px; margin-bottom: 20px; color: #fff; border-left: 4px solid #ff3e6c; padding-left: 10px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .anime-card { background: #14141f; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.3s ease, border-color 0.3s ease; border: 1px solid #1a1a26; }
        .anime-card:hover { transform: translateY(-5px); border-color: #ff3e6c; }
        .anime-card img { width: 100%; height: 250px; object-fit: cover; }
        .anime-info { padding: 12px; }
        .anime-info h3 { font-size: 14px; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .anime-info span { font-size: 12px; color: #8a8a9e; }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>OtakuStream</h1>
            <span>Hoş Geldin! 👋</span>
        </header>

        <!-- VİDEO OYNATICI (Üst Kısım) -->
        <div class="player-wrapper">
            <div class="player-container">
                <!-- Buradaki src kısmına istediğin her videoyu gömebilirsin -->
                <iframe id="animePlayer" src="https://youtube.com" allowfullscreen></iframe>
            </div>
            <div id="currentTitle" class="video-title">Şu An İzlenen: Tanıtım Videosu</div>
        </div>

        <!-- ANİME SEÇME ALANI (Alt Kısım) -->
        <h2 class="section-title">Popüler Animeler</h2>
        <div class="anime-grid">
            
            <!-- 1. Anime Kartı -->
            <div class="anime-card" onclick="changeVideo('https://youtube.com', 'Demon Slayer - 1. Bölüm')">
                <img src="https://unsplash.com" alt="Anime">
                <div class="anime-info">
                    <h3>Demon Slayer</h3>
                    <span>1. Sezon 1. Bölüm</span>
                </div>
            </div>

            <!-- 2. Anime Kartı -->
            <div class="anime-card" onclick="changeVideo('https://youtube.com', 'Naruto Shippuden - 1. Bölüm')">
                <img src="https://unsplash.com" alt="Anime">
                <div class="anime-info">
                    <h3>Naruto Shippuden</h3>
                    <span>1. Sezon 1. Bölüm</span>
                </div>
            </div>

            <!-- 3. Anime Kartı -->
            <div class="anime-card" onclick="changeVideo('https://youtube.com', 'Attack on Titan - 1. Bölüm')">
                <img src="https://unsplash.com" alt="Anime">
                <div class="anime-info">
                    <h3>Attack on Titan</h3>
                    <span>Final Sezonu</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Videolar arası geçişi sağlayan ufak sihirli kodumuz -->
    <script>
        function changeVideo(videoUrl, title) {
            document.getElementById('animePlayer').src = videoUrl;
            document.getElementById('currentTitle').innerText = "Şu An İzlenen: " + title;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
