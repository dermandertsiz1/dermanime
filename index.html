<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dermanime - Anime İzle</title>
    <style>
        /* Genel Stil Tanımlamaları */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar (Üst Menü) */
        header {
            background-color: #1f2833;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #45f3ff;
            box-shadow: 0 4px 15px rgba(69, 243, 255, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #45f3ff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Ana Konteyner */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            width: 100%;
            flex: 1;
        }

        /* Video Oynatıcı Alanı */
        .player-section {
            background-color: #1f2833;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .anime-title {
            font-size: 22px;
            color: #ffffff;
            margin-bottom: 15px;
            border-left: 4px solid #45f3ff;
            padding-left: 10px;
        }

        /* 16:9 Esnek Video Kutusu */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Oranı */
            height: 0;
            overflow: hidden;
            border-radius: 6px;
            background-color: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Bölüm Seçme Alanı */
        .episode-section {
            background-color: #1f2833;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .section-title {
            font-size: 18px;
            color: #fff;
            margin-bottom: 15px;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }

        /* Bölüm Butonları */
        .ep-btn {
            background-color: #0b0c10;
            color: #c5c6c7;
            border: 1px solid #45f3ff;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .ep-btn:hover {
            background-color: #45f3ff;
            color: #0b0c10;
            box-shadow: 0 0 10px rgba(69, 243, 255, 0.5);
        }

        .ep-btn.active {
            background-color: #45f3ff;
            color: #0b0c10;
        }

        /* Footer (Alt Bilgi) */
        footer {
            background-color: #1f2833;
            text-align: center;
            padding: 15px;
            margin-top: auto;
            border-top: 1px solid #0b0c10;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Dermanime</a>
    </header>

    <div class="container">
        
        <div class="player-section">
            <div class="anime-title" id="current-title">Anime Adı - Bölüm 1</div>
            <div class="video-wrapper">
                <iframe id="video-player" src="https://tauvideo.com/embed/ÖRNEK_ID_1" allowfullscreen></iframe>
            </div>
        </div>

        <div class="episode-section">
            <div class="section-title">Bölüm Seçimi</div>
            <div class="episode-grid">
                <button class="ep-btn active" onclick="changeEpisode('https://tauvideo.com/embed/ÖRNEK_ID_1', 'Anime Adı - Bölüm 1', this)">Bölüm 1</button>
                <button class="ep-btn" onclick="changeEpisode('https://tauvideo.com/embed/ÖRNEK_ID_2', 'Anime Adı - Bölüm 2', this)">Bölüm 2</button>
                <button class="ep-btn" onclick="changeEpisode('https://tauvideo.com/embed/ÖRNEK_ID_3', 'Anime Adı - Bölüm 3', this)">Bölüm 3</button>
                <button class="ep-btn" onclick="changeEpisode('https://tauvideo.com/embed/ÖRNEK_ID_4', 'Anime Adı - Bölüm 4', this)">Bölüm 4</button>
            </div>
        </div>

    </div>

    <footer>
        &copy; 2026 Dermanime - Tüm Hakları Saklıdır.
    </footer>

    <script>
        function changeEpisode(videoUrl, episodeTitle, buttonElement) {
            // İframe kaynağını (src) değiştir
            document.getElementById('video-player').src = videoUrl;
            
            // Başlığı değiştir
            document.getElementById('current-title').innerText = episodeTitle;
            
            // Aktif buton stilini güncelle
            let buttons = document.getElementsByClassName('ep-btn');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            buttonElement.classList.add('active');
        }
    </script>

</body>
</html>
